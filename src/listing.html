<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>fshare — {{title}}</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,{{logo}}">
<style>
:root { --bg:#fff; --fg:#1a1a1a; --muted:#777; --line:#e5e5e5; --accent:#0b6cff; }
@media (prefers-color-scheme: dark) {
  :root { --bg:#121212; --fg:#e8e8e8; --muted:#999; --line:#2a2a2a; --accent:#5aa2ff; }
}
* { box-sizing:border-box }
body { margin:0 auto; max-width:56rem; padding:1.5rem 1rem; background:var(--bg);
  color:var(--fg); font:15px/1.5 system-ui, sans-serif; }
header { display:flex; justify-content:space-between; align-items:baseline;
  gap:1rem; flex-wrap:wrap; margin-bottom:1rem; }
a { color:var(--accent); text-decoration:none } a:hover { text-decoration:underline }
.logo { width:22px; height:22px; vertical-align:-5px; margin-right:.5em }
.navbtns { display:none }
@media (max-width:640px){
  header { flex-direction:column; align-items:flex-start; gap:.5rem }
  .navbtns { display:flex; gap:.6em }
  .navbtns a { font-size:1.1em; padding:.1em .5em; border:1px solid var(--line); border-radius:6px }
}
footer { margin-top:2rem; text-align:center; color:var(--muted); font-size:.8em }
footer a { color:var(--muted) }
.zip { font-size:.9em; border:1px solid var(--line); border-radius:6px; padding:.3em .7em }
table { width:100%; border-collapse:collapse }
th { text-align:left; cursor:pointer; user-select:none; color:var(--muted);
  font-weight:600; font-size:.85em; padding:.4em .5em; border-bottom:1px solid var(--line) }
td { padding:.35em .5em; border-bottom:1px solid var(--line) }
tbody tr { cursor:pointer }
tbody tr:hover { background:color-mix(in srgb, var(--line) 40%, transparent) }
tbody tr:active { background:var(--line) }
td.s, th.s { text-align:right; white-space:nowrap; color:var(--muted) }
td.d, th.d { text-align:right; white-space:nowrap; color:var(--muted); font-size:.9em }
.sortbar { display:none }
@media (max-width:640px){
  .sortbar { display:flex; align-items:center; gap:.45em; margin:.8em 0 .3em;
    color:var(--muted); font-size:.85em }
  .sortbar button { font:inherit; color:var(--fg); background:none; cursor:pointer;
    border:1px solid var(--line); border-radius:999px; padding:.25em .8em }
  .sortbar button.on { border-color:var(--accent); color:var(--accent) }
  thead { display:none }
  table, tbody { display:block }
  tr { display:flex; flex-wrap:wrap; column-gap:.35em; padding:.55em 0;
    border-bottom:1px solid var(--line) }
  td { display:block; padding:0; border:none }
  td:empty { display:none }
  td.n { flex:1 1 100%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap }
  td.d { order:2; font-size:.8em }
  td.s { order:3; font-size:.8em }
  td.s:not(:empty)::before { content:"· " }
}
</style>
<header>
  <nav><img class="logo" src="data:image/svg+xml;base64,{{logo}}" alt="">{{crumbs}}</nav>
  <span class="navbtns"><a href="javascript:history.back()" aria-label="back">◀</a><a href="javascript:history.forward()" aria-label="forward">▶</a></span>
  {{zip}}
</header>
{{upload}}
<nav class="sortbar">Sort: <button data-k="0">Name</button><button data-k="1">Size</button><button data-k="2">Date</button></nav>
<table id="t">
  <thead><tr><th data-k="0">Name</th><th class="s" data-k="1">Size</th><th class="d" data-k="2">Modified</th></tr></thead>
  <tbody>{{rows}}</tbody>
</table>
<footer>
  <a href="https://github.com/13/fshare">fshare</a> v{{version}} · built {{built}}
</footer>
<script>
document.querySelectorAll('td.d[data-s]').forEach(td => {
  const d = new Date(td.dataset.s * 1000), p = n => String(n).padStart(2, '0');
  if (isNaN(d)) return;
  td.innerHTML = `${d.getFullYear()}-${p(d.getMonth() + 1)}-${p(d.getDate())} ` +
    `<span class="tm">${p(d.getHours())}:${p(d.getMinutes())}</span>`;
});
document.querySelectorAll('th, .sortbar button').forEach(el => el.onclick = () => {
  const k = +el.dataset.k, tb = document.querySelector('#t tbody');
  const dir = el.dataset.dir = el.dataset.dir === 'a' ? 'd' : 'a';
  [...tb.rows].filter(r => !r.classList.contains('up')).sort((a, b) => {
    const g = b.classList.contains('dir') - a.classList.contains('dir');
    if (g) return g;
    const [x, y] = [a, b].map(r => r.cells[k]?.dataset.s ?? r.cells[k]?.textContent ?? '');
    const n = (+x || +y) ? (+x) - (+y) : x.localeCompare(y);
    return dir === 'a' ? n : -n;
  }).forEach(r => tb.appendChild(r));
  document.querySelectorAll('.sortbar button').forEach(b => {
    b.classList.toggle('on', b === el);
    b.textContent = b.textContent.replace(/ [↑↓]$/, '') + (b === el ? (dir === 'a' ? ' ↑' : ' ↓') : '');
  });
});
document.querySelectorAll('#t tbody tr').forEach(tr => {
  const a = tr.querySelector('td.n a');
  if (a) tr.onclick = e => { if (!e.target.closest('a')) a.click(); };
});
</script>
